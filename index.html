<script>
  let currentAudio = null;
  let currentButton = null;

  // ===== CREATE PLAYER =====
  const player = document.createElement("div");
  player.innerHTML = `
    <div class="music-player">
      <div class="player-info">
        <div id="player-song">Nothing Playing</div>
        <div id="player-time">0:00 / 0:00</div>
      </div>

      <div class="player-center">
        <button id="main-play">▶</button>

        <input
          type="range"
          id="seek"
          min="0"
          max="100"
          value="0"
        />
      </div>

      <div class="player-right">
        <span>🔊</span>

        <input
          type="range"
          id="volume"
          min="0"
          max="1"
          step="0.01"
          value="1"
        />
      </div>
    </div>
  `;

  document.body.appendChild(player);

  // ===== PLAYER STYLE =====
  const style = document.createElement("style");

  style.innerHTML = `
    body {
      padding-bottom: 90px;
    }

    .music-player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 78px;

      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);

      border-top: 1px solid rgba(255,255,255,0.08);

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 20px;
      z-index: 9999;
    }

    .player-info {
      width: 220px;
    }

    #player-song {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    #player-time {
      color: #888;
      font-size: 0.75rem;
    }

    .player-center {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 700px;
      margin: 0 20px;
    }

    #main-play {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    #seek {
      width: 100%;
      cursor: pointer;
    }

    .player-right {
      width: 140px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #volume {
      width: 100%;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .music-player {
        flex-direction: column;
        height: auto;
        padding: 12px;
        gap: 12px;
      }

      .player-info,
      .player-right,
      .player-center {
        width: 100%;
        max-width: 100%;
      }
    }
  `;

  document.head.appendChild(style);

  // ===== ELEMENTS =====
  const mainPlay = document.getElementById("main-play");
  const seek = document.getElementById("seek");
  const volume = document.getElementById("volume");
  const playerSong = document.getElementById("player-song");
  const playerTime = document.getElementById("player-time");

  // ===== AUDIO FUNCTION =====
  function toggleAudio(id, button) {
    const audio = document.getElementById(id);

    // reset all buttons
    document.querySelectorAll(".card button").forEach(btn => {
      btn.innerText = "▶";
    });

    // pause previous
    if (currentAudio && currentAudio !== audio) {
      currentAudio.pause();
    }

    currentAudio = audio;
    currentButton = button;

    const title =
      button.parentElement.querySelector(".title").innerText;

    playerSong.innerText = title;

    if (audio.paused) {
      audio.play();
      button.innerText = "❚❚";
      mainPlay.innerText = "❚❚";
    } else {
      audio.pause();
      button.innerText = "▶";
      mainPlay.innerText = "▶";
    }

    audio.volume = volume.value;

    audio.addEventListener("timeupdate", updatePlayer);
    audio.addEventListener("ended", resetPlayer);
  }

  // ===== UPDATE PLAYER =====
  function updatePlayer() {
    if (!currentAudio) return;

    const progress =
      (currentAudio.currentTime / currentAudio.duration) * 100;

    seek.value = progress || 0;

    playerTime.innerText =
      formatTime(currentAudio.currentTime) +
      " / " +
      formatTime(currentAudio.duration);
  }

  // ===== SEEK =====
  seek.addEventListener("input", () => {
    if (!currentAudio) return;

    currentAudio.currentTime =
      (seek.value / 100) * currentAudio.duration;
  });

  // ===== VOLUME =====
  volume.addEventListener("input", () => {
    if (!currentAudio) return;

    currentAudio.volume = volume.value;
  });

  // ===== MAIN PLAY BUTTON =====
  mainPlay.addEventListener("click", () => {
    if (!currentAudio) return;

    if (currentAudio.paused) {
      currentAudio.play();

      mainPlay.innerText = "❚❚";

      if (currentButton)
        currentButton.innerText = "❚❚";
    } else {
      currentAudio.pause();

      mainPlay.innerText = "▶";

      if (currentButton)
        currentButton.innerText = "▶";
    }
  });

  // ===== RESET =====
  function resetPlayer() {
    mainPlay.innerText = "▶";

    if (currentButton)
      currentButton.innerText = "▶";

    seek.value = 0;
  }

  // ===== FORMAT TIME =====
  function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";

    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60)
      .toString()
      .padStart(2, "0");

    return mins + ":" + secs;
  }
</script>
