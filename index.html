<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lana Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      filter: blur(8px);
      opacity: 0.15;
      transform: scale(1.1);
      z-index: -1;
    }

    .container {
      width: min(1200px, 92%);
      margin: auto;
      padding: 60px 0;
    }

    .header {
      margin-bottom: 60px;
    }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #999;
      font-size: 0.75rem;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-style: italic;
      line-height: 0.9;
      margin-bottom: 20px;
    }

    .description {
      max-width: 600px;
      color: #aaa;
      line-height: 1.7;
    }

    /* layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      transition: 0.35s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.2);
    }

    /* ✅ FIXED: perfect square album art */
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .content {
      padding: 12px;
    }

    .era {
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #888;
      font-size: 0.7rem;
      margin-bottom: 10px;
    }

    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    button {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.25s ease;
    }

    button:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <div class="container">
    <div class="header">
      <div class="subtitle">Unreleased Archive</div>
      <h1>Lana Archive</h1>
      <p class="description">
        Lana Del Rey unreleased music
      </p>
    </div>

    <div class="grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop">

        <div class="content">
          <div class="era">Born To Die Era</div>

          <div class="bottom">
            <div class="title">Velvet Crowbar</div>
            <button onclick="toggleAudio('song1')">▶</button>
          </div>

          <audio id="song1" src="music/velvetcrowbar.mp3"></audio>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop">

        <div class="content">
          <div class="era">Paradise Era</div>

          <div class="bottom">
            <div class="title">Serial Killer</div>
            <button onclick="toggleAudio('song2')">▶</button>
          </div>

          <audio id="song2" src="music/serialkiller.mp3"></audio>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1501612780327-45045538702b?q=80&w=1200&auto=format&fit=crop">

        <div class="content">
          <div class="era">Unreleased</div>

          <div class="bottom">
            <div class="title">Queen of Disaster</div>
            <button onclick="toggleAudio('song3')">▶</button>
          </div>

          <audio id="song3" src="music/queenofdisaster.mp3"></audio>
        </div>
      </div>

    </div>
  </div>

  <script>
    function toggleAudio(id) {
      const audio = document.getElementById(id);

      document.querySelectorAll('audio').forEach(a => {
        if (a !== audio) {
          a.pause();
          a.currentTime = 0;
        }
      });

      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    }
  </script>
</body>
</html>
