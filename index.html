<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lana Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: white;
      overflow-x: hidden;
      padding-bottom: 130px;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url('assets/background.jpg');
      background-size: cover;
      background-position: center;
      filter: blur(8px);
      opacity: 0.15;
      transform: scale(1.1);
      z-index: -1;
    }

    .container {
      width: min(1200px, 92%);
      margin: auto;
      padding: 40px 0;
    }

    .header {
      margin-bottom: 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .header-left { flex: 1; }

    .subtitle {
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #999;
      font-size: 0.75rem;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-style: italic;
      line-height: 0.9;
      margin-bottom: 0;
    }

    /* ===== SEARCH ===== */
    .search-wrap {
      position: relative;
      width: 260px;
      flex-shrink: 0;
      margin-bottom: 6px;
    }

    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .search-wrap { width: 100%; margin-bottom: 0; }
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #search::placeholder { color: #555; }

    #search:focus {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.09);
    }

    .no-results {
      display: none;
      color: #555;
      font-size: 0.875rem;
      margin-bottom: 20px;
      font-style: italic;
    }

    /* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 800px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px)  { .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      transition: transform 0.25s ease, border-color 0.25s ease, opacity 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.2);
    }

    .card.hidden { display: none; }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .content { padding: 10px; }

    .era {
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #888;
      font-size: 0.65rem;
      margin-bottom: 6px;
    }

    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title { font-size: 0.95rem; font-weight: 600; }

    button.play-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      font-size: 0.75rem;
      transition: transform 0.2s ease;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button.play-btn:hover { transform: scale(1.08); }

    /* ===== FOOTER CREDIT ===== */
    .credit {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .credit-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #444;
    }

    .credit-note {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #333;
    }

    /* ===== PLAYER ===== */
    .music-player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 9999;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .music-player.visible { transform: translateY(0); }

    /* seek strip sits at the very top of the player bar */
    .player-seek-strip {
      width: 100%;
      padding: 0;
      line-height: 0;
    }

    #seek {
      width: 100%;
      display: block;
      border-radius: 0;
      height: 3px;
      cursor: pointer;
    }

    /* main row inside player */
    .player-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 72px;
      gap: 16px;
    }

    .player-info {
      width: 220px;
      flex-shrink: 0;
    }

    #player-song {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #player-time { color: #666; font-size: 0.75rem; }

    .player-center {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 700px;
    }

    .player-btns {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #main-play {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease;
    }

    #main-play:hover { transform: scale(1.06); }

    #loop-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    #loop-btn:hover { color: #aaa; border-color: rgba(255,255,255,0.3); }
    #loop-btn.active { color: white; border-color: white; background: rgba(255,255,255,0.1); }

    /* desktop seek lives inside player-center */
    .desktop-seek { flex: 1; }

    .player-right {
      width: 140px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #vol-icon {
      flex-shrink: 0;
      opacity: 0.6;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #vol-icon:hover { opacity: 1; }

    /* ===== RANGE INPUTS ===== */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d4d0c8;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: white;
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d4d0c8;
      border: none;
      cursor: pointer;
    }

    #volume { width: 100%; }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      body { padding-bottom: 80px; }

      /* header */
      .header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
      .search-wrap { width: 100%; margin-bottom: 0; }
      h1 { font-size: 2.4rem; }

      /* grid: 2 cols, horizontal cards */
      .grid { grid-template-columns: 1fr 1fr; gap: 8px; }

      .card {
        display: flex;
        flex-direction: row;
        align-items: center;
        border-radius: 14px;
      }
      .card img {
        width: 60px;
        height: 60px;
        flex-shrink: 0;
        aspect-ratio: 1/1;
        border-radius: 10px 0 0 10px;
      }
      .content { padding: 6px 8px; flex: 1; min-width: 0; }
      .era { font-size: 0.55rem; margin-bottom: 2px; letter-spacing: 0.15em; }
      .title { font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      button.play-btn { width: 28px; height: 28px; font-size: 0.6rem; flex-shrink: 0; }

      /* player: seek strip on top, one compact row below */
      .player-inner {
        padding: 0 14px;
        height: 58px;
        gap: 10px;
      }

      .player-info { width: auto; flex: 1; min-width: 0; }
      #player-song { font-size: 0.82rem; }
      #player-time { display: none; }

      /* hide desktop seek clone and volume on mobile */
      .desktop-seek { display: none; }
      .player-right { display: none; }

      #main-play { width: 36px; height: 36px; font-size: 0.8rem; }
      #loop-btn  { width: 26px; height: 26px; }

      /* credit stacks */
      .credit { flex-direction: column; gap: 4px; align-items: flex-start; margin-top: 32px; }
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="subtitle">Unreleased Archive</div>
        <h1>Lana Archive</h1>
      </div>

      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="Search songs, eras…" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="no-results" id="no-results">No songs found.</div>
    <div class="grid" id="grid"></div>

    <!-- CREDIT -->
    <div class="credit">
      <span class="credit-name">archived by Ryan</span>
      <span class="credit-note">fan archive · not affiliated with artist</span>
    </div>
  </div>

  <!-- PLAYER -->
  <div class="music-player" id="player">

    <!-- seek strip: sits flush at top, works on both mobile and desktop -->
    <div class="player-seek-strip">
      <input type="range" id="seek" min="0" max="100" value="0" />
    </div>

    <!-- single inner row for all controls -->
    <div class="player-inner">

      <div class="player-info">
        <div id="player-song">Nothing Playing</div>
        <div id="player-time">0:00 / 0:00</div>
      </div>

      <div class="player-center">
        <div class="player-btns">
          <button id="loop-btn" title="Loop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
          <button id="main-play">▶</button>
        </div>
        <!-- desktop only: seek bar clone inside center -->
        <div class="desktop-seek" id="desktop-seek-spacer"></div>
      </div>

      <div class="player-right">
        <svg id="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" onclick="toggleMute()">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path id="vol-wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path id="vol-wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <line id="vol-mute-line" x1="23" y1="9" x2="17" y2="15" style="display:none"/>
          <line id="vol-mute-line2" x1="17" y1="9" x2="23" y2="15" style="display:none"/>
        </svg>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
      </div>

    </div>
  </div>

  <script>
    let currentAudio  = null;
    let currentButton = null;
    let isLooping     = false;
    let isMuted       = false;
    let prevVolume    = 1;

    const player     = document.getElementById("player");
    const mainPlay   = document.getElementById("main-play");
    const loopBtn    = document.getElementById("loop-btn");
    const seek       = document.getElementById("seek");
    const volSlider  = document.getElementById("volume");
    const playerSong = document.getElementById("player-song");
    const playerTime = document.getElementById("player-time");

    function showPlayer() { player.classList.add("visible"); }

    function toggleAudio(id, button) {
      const audio = document.getElementById(id);

      document.querySelectorAll(".play-btn").forEach(b => { b.innerHTML = "▶"; });

      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      currentAudio  = audio;
      currentButton = button;
      audio.loop    = isLooping;

      playerSong.innerText = button.closest(".card").querySelector(".title").innerText;
      showPlayer();

      if (audio.paused) {
        audio.play();
        button.innerHTML   = "❚❚";
        mainPlay.innerHTML = "❚❚";
      } else {
        audio.pause();
        button.innerHTML   = "▶";
        mainPlay.innerHTML = "▶";
      }

      audio.volume = volSlider.value;

      audio.removeEventListener("timeupdate", updatePlayer);
      audio.addEventListener("timeupdate", updatePlayer);

      audio.removeEventListener("ended", onEnded);
      audio.addEventListener("ended", onEnded);
    }

    function onEnded() {
      if (!isLooping) resetPlayer();
    }

    function updatePlayer() {
      if (!currentAudio) return;
      const progress = (currentAudio.currentTime / currentAudio.duration) * 100;
      seek.value = progress || 0;
      playerTime.innerText = formatTime(currentAudio.currentTime) + " / " + formatTime(currentAudio.duration);
      seek.style.background = `linear-gradient(to right, #c8c4bb ${seek.value}%, rgba(255,255,255,0.15) ${seek.value}%)`;
    }

    seek.addEventListener("input", () => {
      if (!currentAudio) return;
      currentAudio.currentTime = (seek.value / 100) * currentAudio.duration;
      seek.style.background = `linear-gradient(to right, #c8c4bb ${seek.value}%, rgba(255,255,255,0.15) ${seek.value}%)`;
    });

    volSlider.addEventListener("input", () => {
      if (currentAudio) currentAudio.volume = volSlider.value;
      isMuted = volSlider.value == 0;
      prevVolume = volSlider.value > 0 ? volSlider.value : prevVolume;
      updateVolIcon();
      updateVolFill();
    });

    function updateVolFill() {
      const pct = volSlider.value * 100;
      volSlider.style.background = `linear-gradient(to right, #c8c4bb ${pct}%, rgba(255,255,255,0.15) ${pct}%)`;
    }

    function updateVolIcon() {
      const v  = parseFloat(volSlider.value);
      const w1 = document.getElementById("vol-wave-1");
      const w2 = document.getElementById("vol-wave-2");
      const m1 = document.getElementById("vol-mute-line");
      const m2 = document.getElementById("vol-mute-line2");
      if (v === 0 || isMuted) {
        w1.style.display = "none"; w2.style.display = "none";
        m1.style.display = "";    m2.style.display = "";
      } else if (v < 0.5) {
        w1.style.display = "";    w2.style.display = "none";
        m1.style.display = "none"; m2.style.display = "none";
      } else {
        w1.style.display = "";    w2.style.display = "";
        m1.style.display = "none"; m2.style.display = "none";
      }
    }

    function toggleMute() {
      if (isMuted) {
        volSlider.value = prevVolume;
        isMuted = false;
      } else {
        prevVolume = volSlider.value;
        volSlider.value = 0;
        isMuted = true;
      }
      if (currentAudio) currentAudio.volume = volSlider.value;
      updateVolIcon();
      updateVolFill();
    }

    mainPlay.addEventListener("click", () => {
      if (!currentAudio) return;
      if (currentAudio.paused) {
        currentAudio.play();
        mainPlay.innerHTML = "❚❚";
        if (currentButton) currentButton.innerHTML = "❚❚";
      } else {
        currentAudio.pause();
        mainPlay.innerHTML = "▶";
        if (currentButton) currentButton.innerHTML = "▶";
      }
    });

    loopBtn.addEventListener("click", () => {
      isLooping = !isLooping;
      loopBtn.classList.toggle("active", isLooping);
      if (currentAudio) currentAudio.loop = isLooping;
    });

    function resetPlayer() {
      mainPlay.innerHTML = "▶";
      if (currentButton) currentButton.innerHTML = "▶";
      seek.value = 0;
      seek.style.background = `linear-gradient(to right, #c8c4bb 0%, rgba(255,255,255,0.15) 0%)`;
    }

    function formatTime(s) {
      if (isNaN(s)) return "0:00";
      return Math.floor(s / 60) + ":" + Math.floor(s % 60).toString().padStart(2, "0");
    }

    /* ---- search ---- */
    const searchInput = document.getElementById("search");
    const noResults   = document.getElementById("no-results");

    searchInput.addEventListener("input", () => {
      const q = searchInput.value.toLowerCase().trim();
      let visible = 0;
      document.querySelectorAll(".card").forEach(card => {
        const title = card.dataset.title.toLowerCase();
        const era   = card.dataset.era.toLowerCase();
        const match = !q || title.includes(q) || era.includes(q);
        card.classList.toggle("hidden", !match);
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? "block" : "none";
    });

    /* ---- init fills ---- */
    updateVolFill();
    seek.style.background = `linear-gradient(to right, #c8c4bb 0%, rgba(255,255,255,0.15) 0%)`;

    /* ========================================
       TRACKS — edit tracks.json to add songs.
       Format:
       {
         "title": "Song Name",
         "era":   "Era Name",
         "art":   "art/filename.jpg",
         "src":   "music/filename.mp3"
       }
    ======================================== */
    async function loadTracks() {
      const grid = document.getElementById("grid");
      let tracks;
      try {
        const res = await fetch("tracks.json");
        if (!res.ok) throw new Error();
        tracks = await res.json();
      } catch (err) {
        console.error("tracks.json fetch failed:", err);
        grid.innerHTML = `<span style="color:#555;font-style:italic;font-size:0.85rem">Could not load tracks.json — check console for details</span>`;
        return;
      }

      tracks.forEach((track, i) => {
        const id   = "song" + (i + 1);
        const card = document.createElement("div");
        card.className    = "card";
        card.dataset.title = track.title;
        card.dataset.era   = track.era;
        card.innerHTML = `
          <img src="${track.art}" alt="${track.title}">
          <div class="content">
            <div class="era">${track.era}</div>
            <div class="bottom">
              <div class="title">${track.title}</div>
              <button class="play-btn">▶</button>
            </div>
            <audio id="${id}" src="${track.src}"></audio>
          </div>`;
        card.querySelector(".play-btn").addEventListener("click", function () {
          toggleAudio(id, this);
        });
        grid.appendChild(card);
      });
    }

    loadTracks();
  </script>
</body>
</html>
