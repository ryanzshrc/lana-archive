<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lana Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background:#050505;
      color:white;
      overflow-x:hidden;
      padding-bottom:80px;
    }

    .background {
      position:fixed;
      inset:0;
      background-image:url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      filter:blur(8px);
      opacity:0.15;
      transform:scale(1.1);
      z-index:-1;
    }

    .container {
      width:min(1200px, 92%);
      margin:auto;
      padding:40px 0;
    }

    .header { margin-bottom:40px; }

    .subtitle {
      text-transform:uppercase;
      letter-spacing:0.4em;
      color:#999;
      font-size:0.75rem;
      margin-bottom:16px;
    }

    h1 {
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(3rem, 8vw, 6rem);
      font-style:italic;
      line-height:0.9;
      margin-bottom:20px;
    }

    .description { max-width:600px; color:#aaa; line-height:1.7; }

    .grid {
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
    }

    @media (max-width:1100px){ .grid{grid-template-columns:repeat(3,1fr);} }
    @media (max-width:800px){ .grid{grid-template-columns:repeat(2,1fr);} }
    @media (max-width:500px){ .grid{grid-template-columns:1fr;} }

    .card {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      overflow:hidden;
      backdrop-filter:blur(20px);
      transition:0.25s ease;
    }

    .card:hover {
      transform:translateY(-4px);
      border-color:rgba(255,255,255,0.2);
    }

    .card img {
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      display:block;
    }

    .content { padding:10px; }

    .era {
      text-transform:uppercase;
      letter-spacing:0.25em;
      color:#888;
      font-size:0.65rem;
      margin-bottom:6px;
    }

    .bottom {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .title { font-size:0.95rem; font-weight:600; }

    button {
      width:34px;
      height:34px;
      border-radius:50%;
      border:none;
      background:white;
      color:black;
      cursor:pointer;
    }

    /* PLAYER */
    .player {
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      height:64px;
      background:rgba(10,10,10,0.95);
      backdrop-filter:blur(20px);
      border-top:1px solid rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 16px;
    }

    .player-title {
      flex:1;
      font-size:0.85rem;
      color:#ccc;
    }

    .seek {
      flex:2;
      height:4px;
      background:rgba(255,255,255,0.15);
      border-radius:2px;
      cursor:pointer;
      position:relative;
    }

    .seek-bar {
      height:100%;
      width:0%;
      background:white;
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <div class="container">
    <div class="header">
      <div class="subtitle">Unreleased Archive</div>
      <h1>Lana Archive</h1>
      <p class="description">Lana Del Rey unreleased music</p>
    </div>

    <div class="grid">

      <div class="card">
        <img src="art/yourgirl.jpg">
        <div class="content">
          <div class="era">Ultraviolence</div>
          <div class="bottom">
            <div class="title">Your Girl</div>
            <button onclick="playTrack('song1','Your Girl')">▶</button>
          </div>
          <audio id="song1" src="music/yourgirl.mp3"></audio>
        </div>
      </div>

      <div class="card">
        <img src="art/dietmountaindewdemo.png">
        <div class="content">
          <div class="era">Born To Die</div>
          <div class="bottom">
            <div class="title">Diet Mountain Dew</div>
            <button onclick="playTrack('song2','Diet Mountain Dew')">▶</button>
          </div>
          <audio id="song2" src="music/dietmountaindewdemo.mp3"></audio>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1501612780327-45045538702b?q=80&w=1200&auto=format&fit=crop">
        <div class="content">
          <div class="era">Unreleased</div>
          <div class="bottom">
            <div class="title">Queen of Disaster</div>
            <button onclick="playTrack('song3','Queen of Disaster')">▶</button>
          </div>
          <audio id="song3" src="music/queenofdisaster.mp3"></audio>
        </div>
      </div>

    </div>
  </div>

  <!-- PLAYER -->
  <div class="player">
    <div class="player-title" id="title">Nothing playing</div>

    <button id="play">▶</button>

    <div class="seek" id="seek">
      <div class="seek-bar" id="bar"></div>
    </div>
  </div>

  <script>
    let current = null;

    const playBtn = document.getElementById("play");
    const title = document.getElementById("title");
    const seek = document.getElementById("seek");
    const bar = document.getElementById("bar");

    function playTrack(id, name) {
      const audio = document.getElementById(id);

      if (current && current !== audio) {
        current.pause();
        current.currentTime = 0;
      }

      current = audio;
      title.textContent = name;

      audio.play();
      playBtn.textContent = "❚❚";

      update();
    }

    playBtn.onclick = () => {
      if (!current) return;

      if (current.paused) {
        current.play();
        playBtn.textContent = "❚❚";
        update();
      } else {
        current.pause();
        playBtn.textContent = "▶";
      }
    };

    function update() {
      if (!current) return;

      if (current.duration) {
        bar.style.width = (current.currentTime / current.duration) * 100 + "%";
      }

      if (!current.paused) {
        requestAnimationFrame(update);
      }
    }

    seek.onclick = (e) => {
      if (!current) return;

      const rect = seek.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const pct = x / rect.width;

      current.currentTime = pct * current.duration;
    };
  </script>

</body>
</html>
