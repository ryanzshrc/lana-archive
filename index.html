<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lana Archive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background:#050505;
      color:white;
      overflow-x:hidden;
      padding-bottom:100px;
    }

    .background {
      position:fixed;
      inset:0;
      background:url('assets/background.jpg') center/cover;
      filter:blur(8px);
      opacity:0.15;
      transform:scale(1.1);
      z-index:-1;
    }

    .container { width:min(1200px,92%); margin:auto; padding:40px 0; }

    h1 {
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(3rem,8vw,6rem);
      font-style:italic;
      margin-bottom:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    @media(max-width:900px){ .grid{grid-template-columns:repeat(2,1fr);} }
    @media(max-width:500px){ .grid{grid-template-columns:1fr;} }

    .card {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      overflow:hidden;
    }

    .card img { width:100%; aspect-ratio:1; object-fit:cover; }

    .content { padding:10px; }

    .bottom {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button {
      width:34px;
      height:34px;
      border-radius:50%;
      border:none;
      background:white;
      cursor:pointer;
    }

    /* ===== PLAYER ===== */

    .player {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:80px;
      display:none; /* hidden until play */
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      background:rgba(10,10,10,0.92);
      backdrop-filter:blur(20px);
      border-top:1px solid rgba(255,255,255,0.08);
      z-index:9999;
    }

    .player.show { display:flex; }

    .center {
      flex:1;
      display:flex;
      align-items:center;
      gap:10px;
      margin:0 20px;
    }

    #seek { width:100%; }

    .icon-btn {
      width:40px;
      height:40px;
      border-radius:50%;
      border:none;
      background:white;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .icon-btn svg {
      width:18px;
      height:18px;
      fill:currentColor;
    }

    .right {
      display:flex;
      align-items:center;
      gap:10px;
      width:140px;
    }

    #volume { width:100%; }
  </style>
</head>

<body>

<div class="background"></div>

<div class="container">
  <h1>Lana Archive</h1>

  <div class="grid">

    <div class="card">
      <img src="art/yourgirl.jpg">
      <div class="content">
        <div class="bottom">
          <div>Your Girl</div>
          <button onclick="playSong('song1', this)">▶</button>
        </div>
        <audio id="song1" src="music/yourgirl.mp3"></audio>
      </div>
    </div>

    <div class="card">
      <img src="art/dietmountaindewdemo.jpg">
      <div class="content">
        <div class="bottom">
          <div>Diet Mountain Dew</div>
          <button onclick="playSong('song2', this)">▶</button>
        </div>
        <audio id="song2" src="music/dietmountaindewdemo.mp3"></audio>
      </div>
    </div>

    <div class="card">
      <img src="art/nationalanthemdemo.jpg">
      <div class="content">
        <div class="bottom">
          <div>National Anthem</div>
          <button onclick="playSong('song3', this)">▶</button>
        </div>
        <audio id="song3" src="music/nationalanthemdemo.mp3"></audio>
      </div>
    </div>

  </div>
</div>

<!-- PLAYER -->
<div class="player" id="player">

  <div id="now">Nothing Playing</div>

  <div class="center">
    <button class="icon-btn" id="playBtn">▶</button>
    <input type="range" id="seek" min="0" max="100" value="0">
  </div>

  <div class="right">
    <svg viewBox="0 0 24 24">
      <path d="M5 9v6h4l5 5V4L9 9H5z"/>
    </svg>
    <input type="range" id="volume" min="0" max="1" step="0.01">
  </div>

</div>

<script>
let currentAudio = null;
let currentBtn = null;

const songs = ["song1","song2","song3"];

const player = document.getElementById("player");
const now = document.getElementById("now");
const playBtn = document.getElementById("playBtn");
const seek = document.getElementById("seek");
const volume = document.getElementById("volume");

function showPlayer() {
  player.classList.add("show");
}

/* ===== PLAY FROM GRID ===== */
function playSong(id, btn) {
  const audio = document.getElementById(id);

  if (currentAudio && currentAudio !== audio) {
    currentAudio.pause();
  }

  currentAudio = audio;
  currentBtn = btn;

  showPlayer();
  now.textContent = btn.parentElement.querySelector("div").textContent;

  audio.volume = volume.value;
  audio.play();

  btn.innerText = "❚❚";
  playBtn.innerText = "❚❚";

  audio.onended = nextSong;
  audio.ontimeupdate = updateSeek;
}

/* ===== NEXT SONG ===== */
function nextSong() {
  const i = songs.indexOf(currentAudio.id);
  const next = songs[i + 1];

  if (!next) return reset();

  const btn = document.querySelector(`button[onclick*="${next}"]`);
  playSong(next, btn);
}

/* ===== PLAY/PAUSE ===== */
playBtn.onclick = () => {
  if (!currentAudio) return;

  if (currentAudio.paused) {
    currentAudio.play();
    playBtn.innerText = "❚❚";
    if (currentBtn) currentBtn.innerText = "❚❚";
  } else {
    currentAudio.pause();
    playBtn.innerText = "▶";
    if (currentBtn) currentBtn.innerText = "▶";
  }
};

/* ===== SEEK ===== */
seek.oninput = () => {
  if (!currentAudio) return;
  currentAudio.currentTime = (seek.value / 100) * currentAudio.duration;
};

/* ===== VOLUME ===== */
volume.oninput = () => {
  if (!currentAudio) return;
  currentAudio.volume = volume.value;
};

/* ===== UPDATE ===== */
function updateSeek() {
  if (!currentAudio) return;
  seek.value = (currentAudio.currentTime / currentAudio.duration) * 100;
}

/* ===== RESET ===== */
function reset() {
  playBtn.innerText = "▶";
  now.textContent = "Nothing Playing";
  seek.value = 0;
  currentAudio = null;
  currentBtn = null;
}
</script>

</body>
</html>
